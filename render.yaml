services:
  - type: web
    name: geoguide
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    disk:
      name: geoguide-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_URI
        value: sqlite:////data/geoguide.db
